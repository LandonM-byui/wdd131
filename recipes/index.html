<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes Book</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Cook Book Recipes">
    <meta name="author" content="Landon Mahaffey">

    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipes Book">
    <meta property="og:description" content="Cook Book Recipes Website">
    <meta property="og:url" content="images/recipe-book">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Recipes Book">
    <meta name="twitter:description" content="Cook Book Recipes Website">
    <meta name="twitter:image" content="images/recipe-book">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/recipe-book.png">
                

</head>
<body>
    <section class="page-title">
        <img src="images/recipe-book.png" alt="stylized book with a chef hat on the front">
        <p>RecipeBook<p>
    </section>
    
    <section class="searchBar">
        <input class="search" type="text" placeholder="Find a recipe">
        <img src="images/search.svg" alt="search bar magnifine glass">
    </section>

    <hr>

    <section class="recipes">
        <article class="recipe">
            <img src="images/apple-crisp.jpg" alt="apple-crisp in a white bowl with a scoop of ice cream">
            
            <div class="sans-image">
                <button type="button">dessert</button>
                <p class="recipe-name">Apple Crisp</p>
                
                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                <p class="recipe-description">This apple crisp recipe is a simple, yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
            </div>
        </article>
    </section>

    <footer>
        <div class="social-box">
            <div class="social">
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
                <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
                <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
                <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
            </div>   
        </div>
        <div class="icon-credits">
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
        </div>
    </footer>
</body>
</html>
