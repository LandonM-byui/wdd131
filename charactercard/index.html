<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <meta name="description" content="Character card">
    <meta name="author" content="Landon Mahaffey">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="Card for Character in RPG">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="enderpicture.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card">
    <meta name="twitter:description" content="Card for Character in RPG">
    <meta name="twitter:image" content="enderpicture.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
</head>
<body>
    <section class="card" aria-label="Character Card">
        <img class="image" src="enderpicture_converted.webp" alt="Picture of a pale elf wearing leather armor of cream, blue, and purple, with a white hood and mask, a purple blindfold, and weilding a black crystaline dagger. Well... he was holding a dagger, now the picture is too small.">
        <p class="name">Espevé D'Liavellen</p>
        <section class="stats"></section>
        <section class="buttons">
            <button id="atk">Attacked</button>
            <button id="lv">Level Up</button>
        </section>
    </section>
</body>
</html>
